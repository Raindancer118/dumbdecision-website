services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3025:4321"
    volumes:
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      - DATA_DIR=/app/data
      - SITE_URL=${SITE_URL:-https://dumbdecision.de}
      - SMTP_HOST=${SMTP_HOST:-mx.volantic.de}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-kontakt@dumbdecision.de}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-kontakt@dumbdecision.de}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-vorstand@dumbdecision.de}
      - BOT_INVITE_API_URL=${BOT_INVITE_API_URL:-http://bot:8765}
      - BOT_INVITE_API_SECRET=${BOT_INVITE_API_SECRET:-}
      - DISCORD_INVITE_URL=${DISCORD_INVITE_URL:-}
    networks:
      - web

networks:
  web:
    external: true
